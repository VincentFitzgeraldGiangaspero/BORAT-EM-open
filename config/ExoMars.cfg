[CFD]

Case =Exomars
CFDsolution = ../CFD/ExoMars_3D_no_ionisation.vtk
#CFDsolution = ../CFD/ExoMars_38s_3D_coarse_1M.vtk.vtk

InputFileSurface = none
Dimension = 3D
Precomputed_Refractive = yes
Precomputed_Gradient = yes

RefractiveIndex_VarName = RefractiveIndex
Gradient_X_VarName = Gradient_X_Import
Gradient_Y_VarName = Gradient_Y_Import
Gradient_Z_VarName = Gradient_Z_Import

ElectronNumberDensity_VarName = Ne

Model = non_collisional

BoundaryPEC_File = ../3DMeshes/ExoMars_Capsule_polydata.vtk
BoundaryES_File = ../3DMeshes/Sphere20_capsule_coarse.vtk
BoundarySurfacesCFD_File = ../3DMeshes/BoundaryCFD.vtk


[Antenna]
Frequency = 400.0e6
Antenna_Aperture = 80
Antenna_Location = [1.253 , 0 , 1.067]

Antenna_Direction = 43
AntennaAxis = [0,1,0]
TotalRays = 200 

Rho = 0.1
Polarization = 1
E0_Amplitude = 1


[RayTracing]

Ionized_solution = no
Reflections = no

[EikonalIntegrator]

raysSampling = 200
maxNraySteps = 2000
maxStep = 0.5
firstStep = 1e-2

Cutoff=yes
CutoffValue=0.01

Tolerance=1e-8
method = RK45

[Aperture]

tstart_obs=0
tstop_obs=180
delt=4
pstart_obs=-180
pstop_obs=180
delp=4

[TecIO]
LibraryPath = /Applications/Tecplot 360 EX 2024 R1/Tecplot 360 EX 2024 R1.app/Contents/Frameworks/libtecio.dylib

[Parallelization]
Parallel = yes
# Parallel_Method = pool
Parallel_Method = joblib
# Parallel_Method = p_map

Processors = 8


[Output]
OutputFolder = Test
raySolutionFileTecplot = Test/Rays.szplt
raySolutionFilePKL = Test/Rays.plk

